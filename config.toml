[theme]
# Deep Velvet Charcoal for buttons, slider nodes, and active text states
primaryColor = "#111827"

# A rich, warm, gallery-grade Cream for the main body background
backgroundColor = "#FDFBF7"

# A slightly deeper Sand/Cream for sidebars and container card surfaces
secondaryBackgroundColor = "#F4EFE6"

# A sharp Slate/Charcoal Black for exceptionally readable text
textColor = "#1F2937"

# Sleek geometric typography
font = "sans serif"

[client]
# Strips away the "Deploy" button to make your app look like a custom web application
showDeployButton = false

[browser]
# Disables usage telemetry
gatherUsageStats = false